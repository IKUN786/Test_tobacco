#数据文件
test_login:
  - case_name: "登录成功-正确的用户名密码"
    login_api: /api/user/login
    body:
      userEmpId: "admin"
      userPassword: "123456"
    expected:
      status_code: 200
      code: 1
  - case_name: "登录失败-账号不存在"
    login_api: /api/user/login
    body:
      userEmpId: "admin1"
      userPassword: "123456"
    expected:
      status_code: 401
      code: 0
      msg: "账号不存在"
  - case_name: "登录失败-密码错误"
    login_api: /api/user/login
    body:
      userEmpId: "admin"
      userPassword: "1234567"
    expected:
      status_code: 401
      code: 0
      msg: "密码错误"
  - case_name: "登录失败-用户名和密码为空"
    login_api: /api/user/login
    body:
      userEmpId: ""
      userPassword: ""
    expected:
      status_code: 401
      code: 0
      msg: "账号不存在"

